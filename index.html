<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gli Eroi della Super Terra — Ritira il tuo Premio</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;700;900&family=Barlow:wght@400;500&display=swap');

    :root {
      --yellow: #F5C400;
      --red: #C0281C;
      --blue-deep: #0a1628;
      --blue-mid: #0d1f3c;
      --dark: #0e1a2e;
      --darker: #080f1c;
      --gray: #1a2235;
      --text: #e8e0cc;
      --muted: #6a7a90;
      --common-border: #2a3a50;
      --rare-glow: #F5C400;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--darker);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      position: relative;
    }

    /* Sfondo tattico */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(100, 160, 255, 0.03) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(100, 160, 255, 0.03) 40px);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(20, 60, 120, 0.25) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 80%, rgba(192, 40, 28, 0.08) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== SCHERMATA INIZIALE ===== */
    #screen-intro {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      z-index: 1;
      text-align: center;
      padding: 2rem;
    }

    .eagle-icon {
      width: 180px;
      border-radius: 12px;
      opacity: 0.9;
      animation: pulse-eagle 3s ease-in-out infinite;
    }

    @keyframes pulse-eagle {

      0%,
      100% {
        opacity: 0.5;
        transform: scale(1);
      }

      50% {
        opacity: 0.9;
        transform: scale(1.05);
      }
    }

    .intro-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(2rem, 8vw, 3.5rem);
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--yellow);
      text-shadow: 0 0 40px rgba(245, 196, 0, 0.3);
    }

    .intro-title span {
      display: block;
      font-size: 0.55em;
      color: var(--text);
      letter-spacing: 0.2em;
      font-weight: 700;
      margin-bottom: 0.3em;
    }

    .intro-subtitle {
      font-size: 0.9rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      max-width: 300px;
      line-height: 1.6;
    }

    /* Busta */
    #pack-wrapper {
      position: relative;
      cursor: pointer;
      perspective: 800px;
      margin: 1rem 0;
    }

    #pack-img {
      width: 220px;
      display: block;
      transform-origin: center bottom;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 25px rgba(180, 150, 50, 0.2));
      animation: pack-idle 4s ease-in-out infinite;
    }

    @keyframes pack-idle {

      0%,
      100% {
        transform: rotateY(-4deg) rotateX(2deg) translateY(0px);
        filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.8)) drop-shadow(0 0 20px rgba(245, 196, 0, 0.15));
      }

      25% {
        transform: rotateY(4deg) rotateX(-1deg) translateY(-6px);
        filter: drop-shadow(0 30px 50px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 30px rgba(245, 196, 0, 0.25));
      }

      75% {
        transform: rotateY(-2deg) rotateX(3deg) translateY(-3px);
        filter: drop-shadow(0 25px 45px rgba(0, 0, 0, 0.85)) drop-shadow(0 0 15px rgba(245, 196, 0, 0.2));
      }
    }

    #pack-wrapper:hover #pack-img {
      animation: none;
      transform: rotateY(0deg) rotateX(-8deg) scale(1.05) translateY(-10px);
      filter: drop-shadow(0 40px 60px rgba(0, 0, 0, 0.9)) drop-shadow(0 0 40px rgba(180, 150, 50, 0.4));
    }

    .click-hint {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--yellow);
      opacity: 0;
      animation: blink-hint 2s ease-in-out 1.5s infinite;
      margin-top: -0.5rem;
    }

    @keyframes blink-hint {

      0%,
      100% {
        opacity: 0;
      }

      50% {
        opacity: 0.8;
      }
    }

    /* ===== ANIMAZIONE APERTURA ===== */
    #screen-opening {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 10;
      align-items: center;
      justify-content: center;
      background: var(--darker);
      flex-direction: column;
    }

    #pack-anim {
      width: 240px;
      display: block;
      transform-origin: center center;
    }

    .flash-overlay {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 20;
    }

    /* ===== SCHERMATA CARTE ===== */
    #screen-cards {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      z-index: 1;
      padding: 2rem 1rem;
      width: 100%;
      max-width: 900px;
    }

    .cards-header {
      text-align: center;
    }

    .cards-header h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--yellow);
      text-shadow: 0 0 30px rgba(245, 196, 0, 0.4);
    }

    .cards-header p {
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    /* Grid carte */
    .cards-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      width: 100%;
    }

    /* Singola carta */
    .card {
      width: 150px;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      transform: translateY(60px) scale(0.8);
      opacity: 0;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      flex-shrink: 0;
    }

    .card.reveal {
      animation: card-reveal 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes card-reveal {
      0% {
        transform: translateY(60px) scale(0.8) rotateY(90deg);
        opacity: 0;
      }

      60% {
        transform: translateY(-8px) scale(1.05) rotateY(-5deg);
        opacity: 1;
      }

      100% {
        transform: translateY(0) scale(1) rotateY(0deg);
        opacity: 1;
      }
    }

    .card:hover {
      transform: translateY(-8px) scale(1.06);
      z-index: 5;
    }

    .card.common {
      border: 2px solid var(--common-border);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    }

    .card.rare {
      border: 2px solid var(--yellow);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6), 0 0 20px rgba(245, 196, 0, 0.3), 0 0 40px rgba(245, 196, 0, 0.15);
      animation-name: card-reveal-rare;
    }

    @keyframes card-reveal-rare {
      0% {
        transform: translateY(60px) scale(0.8) rotateY(90deg);
        opacity: 0;
      }

      60% {
        transform: translateY(-12px) scale(1.1) rotateY(-8deg);
        opacity: 1;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 60px rgba(245, 196, 0, 0.6);
      }

      100% {
        transform: translateY(0) scale(1) rotateY(0deg);
        opacity: 1;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6), 0 0 20px rgba(245, 196, 0, 0.3), 0 0 40px rgba(245, 196, 0, 0.15);
      }
    }

    .card-img-wrapper {
      width: 100%;
      aspect-ratio: 2/3;
      overflow: hidden;
      background: var(--gray);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .card-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Placeholder per il prototipo */
    .card-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem;
    }

    .card-placeholder .card-number {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 3rem;
      line-height: 1;
      opacity: 0.3;
    }

    .card-placeholder .card-codename {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.4;
      text-align: center;
    }

    .rare-shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg,
          transparent 40%,
          rgba(245, 196, 0, 0.15) 50%,
          transparent 60%);
      background-size: 200% 100%;
      animation: shimmer 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shimmer {
      0% {
        background-position: -100% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .card-footer {
      background: var(--dark);
      padding: 6px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .card-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rarity-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 5px;
      border-radius: 3px;
      flex-shrink: 0;
      margin-left: 4px;
    }

    .badge-comune {
      background: rgba(74, 64, 48, 0.6);
      color: #9a8a70;
    }

    .badge-rara {
      background: rgba(245, 196, 0, 0.2);
      color: var(--yellow);
    }

    /* Timer e azioni */
    .timer-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.25rem;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      width: 100%;
      max-width: 500px;
    }

    .timer-icon {
      font-size: 1rem;
      opacity: 0.5;
    }

    .timer-text {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex: 1;
    }

    .timer-countdown {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      color: var(--yellow);
      letter-spacing: 0.1em;
    }

    /* Footer */
    .md-footer {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.5rem;
      opacity: 0.5;
      text-align: center;
      z-index: 1;
      padding-bottom: 1rem;
    }

    /* Reset per test */
    #btn-reset {
      margin-top: 0.5rem;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: var(--muted);
      padding: 8px 20px;
      border-radius: 4px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    #btn-reset:hover {
      border-color: var(--yellow);
      color: var(--yellow);
    }

    /* Particelle */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 15;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      opacity: 0;
    }
  </style>
</head>

<body>

  <!-- Overlay flash bianco -->
  <div class="flash-overlay" id="flash"></div>
  <!-- Container particelle -->
  <div class="particles" id="particles"></div>

  <!-- SCHERMATA 1: Intro con busta -->
  <div id="screen-intro">
    <!-- Logo Super Terra -->
    <img class="eagle-icon" src="./assets/superearth.png" alt="Super Earth">

    <h1 class="intro-title">
      <span>Managed Democracy</span>
      Ritira il<br>tuo premio
    </h1>

    <p class="intro-subtitle">Hai guadagnato un pacchetto. La Super Terra ti ricompensa per il tuo servizio.</p>

    <div id="pack-wrapper" onclick="startOpening()">
      <img id="pack-img" src="./assets/busta.png" alt="Pacchetto carte Gli Eroi della Super Terra">
    </div>

    <p class="click-hint">▼ tocca per aprire ▼</p>
  </div>

  <!-- SCHERMATA 2: Apertura in corso -->
  <div id="screen-opening">
    <img id="pack-anim" src="./assets/busta.png" alt="Pacchetto in apertura">
  </div>

  <!-- SCHERMATA 3: Carte rivelate -->
  <div id="screen-cards">
    <div class="cards-header">
      <h2>Carte Sbloccate</h2>
      <p>Scarica le immagini prima che scada il tempo</p>
    </div>

    <div class="cards-grid" id="cards-grid">
      <!-- Popolato da JS -->
    </div>

    <div class="timer-bar">
      <span class="timer-icon">⏱</span>
      <span class="timer-text">Disponibili per</span>
      <span class="timer-countdown" id="timer-display">59:59</span>
    </div>

    <button id="btn-reset" onclick="resetDemo()">↺ Reset Demo</button>
  </div>

  <p class="md-footer">Managed Democracy © Super Earth Armed Forces</p>

  <script>
    // ===== DATI PROTOTIPO =====
    // In produzione: array di oggetti { id, name, rarity, url } ricevuti dal backend
    const DEMO_CARDS = [
      { id: '001-helldivers-s1', name: 'Helldiver Alpha', rarity: 'comune', color: '#2a3a2a', num: '001' },
      { id: '002-terminid-s1', name: 'Terminid Warrior', rarity: 'comune', color: '#3a2a1a', num: '002' },
      { id: '003-automaton-s1', name: 'Automaton Scout', rarity: 'comune', color: '#1a2a3a', num: '003' },
      { id: '004-joel-s1', name: 'J.O.E.L.', rarity: 'rara', color: '#3a2a00', num: '★' },
      { id: '005-bile-s1', name: 'Bile Titan', rarity: 'comune', color: '#2a3a1a', num: '005' },
      { id: '006-eagle-s1', name: 'Eagle Airstrike', rarity: 'comune', color: '#3a1a2a', num: '006' },
      { id: '007-pelican-s1', name: 'Pelican-1', rarity: 'comune', color: '#1a3a3a', num: '007' },
      { id: '008-super-s1', name: 'Super Destroyer', rarity: 'comune', color: '#2a1a3a', num: '008' },
      { id: '009-patriot-s1', name: 'EXO-49 Patriot', rarity: 'comune', color: '#3a3a1a', num: '009' },
      { id: '010-democracy-s1', name: 'Democracy Officer', rarity: 'comune', color: '#1a1a2a', num: '010' },
      { id: '011-managed-s1', name: 'Managed Democracy', rarity: 'comune', color: '#2a2a3a', num: '011' },
    ];

    // Per il demo selezioniamo 10 comuni + 1 rara (in produzione le manda il backend)
    const SELECTED_CARDS = [
      ...DEMO_CARDS.filter(c => c.rarity === 'comune').slice(0, 10),
      ...DEMO_CARDS.filter(c => c.rarity === 'rara')
    ];

    let timerInterval = null;
    let secondsLeft = 3599; // 1 ora - 1 secondo

    // ===== APERTURA BUSTA =====
    function startOpening() {
      const introEl = document.getElementById('screen-intro');
      const openingEl = document.getElementById('screen-opening');
      const packAnim = document.getElementById('pack-anim');
      const flash = document.getElementById('flash');

      // Nascondi intro
      introEl.style.transition = 'opacity 0.3s';
      introEl.style.opacity = '0';
      setTimeout(() => {
        introEl.style.display = 'none';
        openingEl.style.display = 'flex';
      }, 300);

      // Sequenza animazione apertura
      setTimeout(() => {
        // Fase 1: trema
        packAnim.style.transition = 'transform 0.1s ease';
        let shake = 0;
        const shakeInterval = setInterval(() => {
          shake++;
          packAnim.style.transform = `translateX(${(Math.random() - 0.5) * 10}px) rotate(${(Math.random() - 0.5) * 3}deg)`;
          if (shake > 12) {
            clearInterval(shakeInterval);
            packAnim.style.transform = '';
          }
        }, 80);
      }, 300);

      setTimeout(() => {
        // Fase 2: si solleva e si stira
        packAnim.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
        packAnim.style.transform = 'scaleY(0.85) scaleX(1.1) translateY(-20px)';
      }, 1400);

      setTimeout(() => {
        // Fase 3: esplode + flash + particelle
        packAnim.style.transition = 'transform 0.15s ease, opacity 0.15s ease';
        packAnim.style.transform = 'scale(2.5) rotate(15deg)';
        packAnim.style.opacity = '0';

        // Flash bianco
        flash.style.transition = 'opacity 0.08s ease';
        flash.style.opacity = '0.9';

        // Particelle
        spawnParticles();

        setTimeout(() => {
          flash.style.transition = 'opacity 0.4s ease';
          flash.style.opacity = '0';
          openingEl.style.display = 'none';
          showCards();
        }, 150);
      }, 1900);
    }

    // ===== PARTICELLE =====
    function spawnParticles() {
      const container = document.getElementById('particles');
      const colors = ['#F5C400', '#C0281C', '#ffffff', '#FFE066', '#FF6B6B'];
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;

      for (let i = 0; i < 60; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = (Math.random() * Math.PI * 2);
        const speed = 80 + Math.random() * 200;
        const size = 3 + Math.random() * 6;
        const color = colors[Math.floor(Math.random() * colors.length)];
        const duration = 0.6 + Math.random() * 0.8;

        p.style.cssText = `
        left: ${cx}px; top: ${cy}px;
        width: ${size}px; height: ${size}px;
        background: ${color};
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        position: absolute;
        opacity: 1;
        transition: none;
      `;
        container.appendChild(p);

        const tx = Math.cos(angle) * speed;
        const ty = Math.sin(angle) * speed;

        requestAnimationFrame(() => {
          p.style.transition = `transform ${duration}s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity ${duration}s ease`;
          p.style.transform = `translate(${tx}px, ${ty}px) rotate(${Math.random() * 360}deg) scale(0)`;
          p.style.opacity = '0';
        });

        setTimeout(() => p.remove(), duration * 1000 + 100);
      }
    }

    // ===== MOSTRA CARTE =====
    function showCards() {
      const cardsScreen = document.getElementById('screen-cards');
      const grid = document.getElementById('cards-grid');
      grid.innerHTML = '';

      cardsScreen.style.display = 'flex';

      // Ordina: comuni prime, rara ultima
      const sorted = [...SELECTED_CARDS].sort((a, b) => {
        if (a.rarity === 'rara') return 1;
        if (b.rarity === 'rara') return -1;
        return 0;
      });

      sorted.forEach((card, i) => {
        const el = buildCard(card);
        grid.appendChild(el);

        // Reveal con delay progressivo
        setTimeout(() => {
          el.classList.add('reveal');
          if (card.rarity === 'rara') {
            setTimeout(() => spawnParticles(), 200);
          }
        }, 100 + i * 120);
      });

      // Avvia timer
      startTimer();
    }

    function buildCard(card) {
      const el = document.createElement('div');
      el.className = `card ${card.rarity}`;
      el.title = card.name;

      // In produzione: <img src="${GITHUB_PAGES_BASE}/cards/${card.id}.png">
      // Prototipo: placeholder colorato
      el.innerHTML = `
      <div class="card-img-wrapper">
        <div class="card-placeholder" style="background: ${card.color};">
          <span class="card-number" style="color: ${card.rarity === 'rara' ? '#F5C400' : '#ffffff'}">${card.num}</span>
          <span class="card-codename">${card.id}</span>
        </div>
        ${card.rarity === 'rara' ? '<div class="rare-shimmer"></div>' : ''}
      </div>
      <div class="card-footer">
        <span class="card-name">${card.name}</span>
        <span class="rarity-badge badge-${card.rarity}">${card.rarity === 'rara' ? 'RARA' : 'COM'}</span>
      </div>
    `;
      return el;
    }

    // ===== TIMER =====
    function startTimer() {
      secondsLeft = 3599;
      updateTimerDisplay();
      timerInterval = setInterval(() => {
        secondsLeft--;
        if (secondsLeft <= 0) {
          clearInterval(timerInterval);
          onTimerExpired();
          return;
        }
        updateTimerDisplay();
        // Cambio colore negli ultimi 5 minuti
        if (secondsLeft < 300) {
          document.getElementById('timer-display').style.color = '#C0281C';
        }
      }, 1000);
    }

    function updateTimerDisplay() {
      const m = String(Math.floor(secondsLeft / 60)).padStart(2, '0');
      const s = String(secondsLeft % 60).padStart(2, '0');
      document.getElementById('timer-display').textContent = `${m}:${s}`;
    }

    function onTimerExpired() {
      const cardsScreen = document.getElementById('screen-cards');
      cardsScreen.style.transition = 'opacity 1s';
      cardsScreen.style.opacity = '0.2';
      cardsScreen.style.pointerEvents = 'none';
      document.querySelector('.cards-header p').textContent = 'Tempo scaduto. Le carte non sono più disponibili.';
      document.getElementById('timer-display').textContent = '00:00';
    }

    // ===== RESET DEMO =====
    function resetDemo() {
      clearInterval(timerInterval);
      document.getElementById('screen-cards').style.display = 'none';
      document.getElementById('screen-cards').style.opacity = '1';
      document.getElementById('screen-cards').style.pointerEvents = 'auto';
      document.querySelector('.cards-header p').textContent = 'Scarica le immagini prima che scada il tempo';
      document.getElementById('timer-display').style.color = 'var(--yellow)';

      const intro = document.getElementById('screen-intro');
      intro.style.display = 'flex';
      intro.style.opacity = '0';
      setTimeout(() => {
        intro.style.transition = 'opacity 0.4s';
        intro.style.opacity = '1';
      }, 50);
    }
  </script>
</body>

</html>
